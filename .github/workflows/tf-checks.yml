name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@521761c1a5cf68d919980a2ed84b755182aeabfe # pinned to latest
    with:
      provider: none
      working_directory: './_examples/basic/'
      provider: none
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@521761c1a5cf68d919980a2ed84b755182aeabfe # pinned to latest
    with:
      provider: none
      working_directory: './_examples/complete/'
      provider: none

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@d27d2d3b49bcf14db85bdfb0f57956abf18bb091 # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
